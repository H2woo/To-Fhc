<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级小马里奥</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 80px rgba(52,152,219,0.2);
    border-radius: 8px;
    border: 3px solid #34495e;
  }
  canvas {
    display: block;
    border-radius: 6px;
    max-width: 100vw;
    max-height: 100vh;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 10;
  }
  #ui-overlay span { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 4px; }
  .mobile-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: none;
    pointer-events: none;
    z-index: 20;
  }
  .mobile-controls button {
    position: absolute;
    pointer-events: auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    transition: background 0.1s;
  }
  .mobile-controls button:active { background: rgba(255,255,255,0.3); }
  #btn-left { bottom: 8px; left: 16px; }
  #btn-right { bottom: 8px; left: 96px; }
  #btn-jump { bottom: 8px; right: 24px; width: 72px; height: 72px; font-size: 20px; }
  @media (pointer: coarse) {
    .mobile-controls { display: block; }
    #ui-overlay span { font-size: 12px; padding: 3px 8px; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <span id="coinDisplay">🪙 × 0</span>
    <span id="timeDisplay">⏱ 0.0s</span>
  </div>
  <div class="mobile-controls">
    <button id="btn-left">◀</button>
    <button id="btn-right">▶</button>
    <button id="btn-jump">▲<br><small>跳</small></button>
  </div>
</div>

<script>
// ============================================================
//  CANVAS SETUP
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;
canvas.width = W; canvas.height = H;

// Responsive scaling
function fitCanvas() {
  const cw = window.innerWidth - 20;
  const ch = window.innerHeight - 20;
  const scale = Math.min(cw / W, ch / H, 1.8);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ============================================================
//  AUDIO (Web Audio API – simple synthesized sounds)
// ============================================================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'square', vol = 0.08) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxJump() { playTone(350, 0.12); setTimeout(() => playTone(520, 0.08), 60); }
function sfxCoin() { playTone(988, 0.1, 'square', 0.06); setTimeout(() => playTone(1319, 0.15, 'square', 0.06), 100); }
function sfxStomp() { playTone(200, 0.1, 'triangle', 0.12); }
function sfxDie() { playTone(400, 0.08); setTimeout(() => playTone(200, 0.15), 100); setTimeout(() => playTone(100, 0.2), 220); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'square', 0.07), i * 120));
}

// ============================================================
//  INPUT
// ============================================================
const keys = { left: false, right: false, jump: false, jumpPressed: false };
let jumpBuffer = false; // for "press" detection

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') { e.preventDefault(); if (!keys.jump) { jumpBuffer = true; } keys.jump = true; }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') { e.preventDefault(); keys.jump = false; }
});

// Touch / mobile buttons
const touchState = { left: false, right: false, jump: false, jumpPressed: false };
['btn-left', 'btn-right', 'btn-jump'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  const key = id.replace('btn-', '');
  el.addEventListener('touchstart', e => { e.preventDefault(); if (key === 'jump' && !touchState.jump) touchState.jumpPressed = true; touchState[key] = true; }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; }, { passive: false });
  el.addEventListener('touchcancel', e => { touchState[key] = false; }, { passive: false });
  el.addEventListener('mousedown', e => { if (key === 'jump' && !touchState.jump) touchState.jumpPressed = true; touchState[key] = true; });
  el.addEventListener('mouseup', e => { touchState[key] = false; });
  // Prevent context menu on long press
  el.addEventListener('contextmenu', e => e.preventDefault());
});

// ============================================================
//  LEVEL DATA
// ============================================================
const GROUND_Y = 380;
const LEVEL_W = 3800;

// Ground segments: [x, y, w, h]
const groundSegs = [
  [0, GROUND_Y, 950, 70],
  [1090, GROUND_Y, 1050, 70],
  [2280, GROUND_Y, 1500, 70],
];

// Platforms: [x, y, w, h]
// All platforms over ground have bottom <= 352 (player head height) so player can walk under
const platforms = [
  [200, 330, 100, 20],    // easy starter platform
  [500, 300, 100, 20],    // intermediate (80px above ground)
  [850, 330, 100, 20],    // approach to gap 1
  [960, 355, 100, 20],    // bridge over gap 1
  [1200, 315, 140, 20],   // after gap 1
  [1500, 275, 100, 20],   // high platform (from 315→275=40px up)
  [1750, 325, 120, 20],   // stepping down
  [2000, 300, 130, 20],   // before gap 2
  [2150, 355, 100, 20],   // bridge over gap 2
  [2400, 315, 140, 20],   // after gap 2
  [2700, 295, 100, 20],   // reachable from ground
  [3000, 325, 200, 20],   // final approach
];

// Enemies: [x, y, w, h, patrolRange, type]
const enemyData = [
  { x: 480, y: GROUND_Y - 22, w: 30, h: 22, range: 80 },
  { x: 1350, y: GROUND_Y - 22, w: 30, h: 22, range: 70 },
  { x: 2500, y: GROUND_Y - 22, w: 30, h: 22, range: 80 },
  { x: 2900, y: GROUND_Y - 22, w: 30, h: 22, range: 80 },
];

// Coins: [x, y]
const coinPositions = [
  [120, GROUND_Y - 30],
  [250, GROUND_Y - 70],
  [350, 315],
  [530, 280],
  [850, 325],
  [1010, 335],
  [1250, 295],
  [1530, 255],
  [1780, 305],
  [2050, 280],
  [2450, 295],
  [2750, 275],
  [3050, 305],
  [3400, GROUND_Y - 30],
];

// Flag position
const FLAG_X = 3550;

// ============================================================
//  GAME STATE
// ============================================================
const state = {
  screen: 'start', // 'start' | 'playing' | 'dead' | 'win'
  coins: 0,
  time: 0,
  deaths: 0,
  jumpCount: 0,
  frame: 0,
  startTime: 0,
  deadTimer: 0,
};

// Player
const player = {
  x: 60, y: GROUND_Y - 28, w: 24, h: 28,
  vx: 0, vy: 0,
  grounded: false,
  facingRight: true,
  walkFrame: 0,
  walkTimer: 0,
  invincible: 0,
};

// Enemies (live objects)
let enemies = [];
let coins = [];
let particles = [];
let flagReached = false;

// Camera
const cam = { x: 0 };

// ============================================================
//  INIT / RESET
// ============================================================
function resetGame() {
  player.x = 60;
  player.y = GROUND_Y - player.h;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
  player.facingRight = true;
  player.walkFrame = 0;
  player.invincible = 0;

  enemies = enemyData.map(e => ({
    x: e.x, y: e.y, w: e.w, h: e.h,
    startX: e.x, range: e.range,
    dir: -1, alive: true, deadTimer: 0,
  }));

  coins = coinPositions.map(p => ({
    x: p[0], y: p[1], w: 14, h: 14, collected: false, bob: Math.random() * Math.PI * 2,
  }));

  particles = [];
  flagReached = false;
  cam.x = 0;

  state.coins = 0;
  state.deaths = 0;
  state.jumpCount = 0;
  state.time = 0;
  state.frame = 0;
  state.deadTimer = 0;
}

function startGame() {
  resetGame();
  state.screen = 'playing';
  state.startTime = performance.now();
  initAudio();
}

// ============================================================
//  PHYSICS & COLLISION HELPERS
// ============================================================
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getAllSolidTiles() {
  const tiles = [];
  // Ground segments
  for (const g of groundSegs) {
    tiles.push({ x: g[0], y: g[1], w: g[2], h: g[3] });
  }
  // Platforms (only top collision – treat as thin platforms)
  for (const p of platforms) {
    tiles.push({ x: p[0], y: p[1], w: p[2], h: p[3] });
  }
  return tiles;
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
  state.frame++;

  if (state.screen === 'dead') {
    state.deadTimer--;
    if (state.deadTimer <= 0) {
      resetGame();
      state.screen = 'playing';
    }
    return;
  }
  if (state.screen !== 'playing') return;

  // Update time
  state.time = (performance.now() - state.startTime) / 1000;

  // ---- INPUT ----
  const left = keys.left || touchState.left;
  const right = keys.right || touchState.right;
  const jump = keys.jump || touchState.jump;
  const jumpPressed = jumpBuffer || touchState.jumpPressed;
  jumpBuffer = false;
  touchState.jumpPressed = false;

  // ---- PLAYER MOVEMENT ----
  if (left) { player.vx = -4.8; player.facingRight = false; }
  else if (right) { player.vx = 4.8; player.facingRight = true; }
  else { player.vx *= 0.7; if (Math.abs(player.vx) < 0.3) player.vx = 0; }

  // Walk animation
  if (player.grounded && Math.abs(player.vx) > 1) {
    player.walkTimer++;
    if (player.walkTimer > 6) { player.walkTimer = 0; player.walkFrame = (player.walkFrame + 1) % 4; }
  } else if (player.grounded) {
    player.walkFrame = 0;
  }

  // Jump
  if (jumpPressed && player.grounded) {
    player.vy = -10;
    player.grounded = false;
    state.jumpCount++;
    sfxJump();
  }
  // Variable jump height: release early → cut velocity
  if (!jump && player.vy < -4) {
    player.vy *= 0.5;
  }

  // Gravity
  player.vy += 0.5;
  if (player.vy > 14) player.vy = 14;

  // ---- X COLLISION ----
  player.x += player.vx;
  // World bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x + player.w > LEVEL_W) { player.x = LEVEL_W - player.w; }

  const solids = getAllSolidTiles();
  for (const s of solids) {
    if (rectCollide(player, s)) {
      // Determine which side
      const overlapLeft = (player.x + player.w) - s.x;
      const overlapRight = (s.x + s.w) - player.x;
      const overlapTop = (player.y + player.h) - s.y;
      const overlapBottom = (s.y + s.h) - player.y;

      // Find smallest overlap
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (minOverlap === overlapLeft && player.vx > 0) {
        player.x = s.x - player.w;
      } else if (minOverlap === overlapRight && player.vx < 0) {
        player.x = s.x + s.w;
      }
    }
  }

  // ---- Y COLLISION ----
  player.grounded = false;
  player.y += player.vy;

  for (const s of solids) {
    if (rectCollide(player, s)) {
      const overlapTop = (player.y + player.h) - s.y;
      const overlapBottom = (s.y + s.h) - player.y;

      if (overlapTop < overlapBottom && player.vy >= 0) {
        // Landing on top
        player.y = s.y - player.h;
        player.vy = 0;
        player.grounded = true;
      } else if (overlapBottom < overlapTop && player.vy < 0) {
        // Hit head
        player.y = s.y + s.h;
        player.vy = 0;
      }
    }
  }

  // Fall death
  if (player.y > H + 50) {
    die();
    return;
  }

  // ---- INVINCIBILITY TIMER ----
  if (player.invincible > 0) player.invincible--;

  // ---- ENEMIES ----
  for (const e of enemies) {
    if (!e.alive) {
      e.deadTimer++;
      continue;
    }
    // Move
    e.x += e.dir * 0.8;
    if (e.x < e.startX - e.range || e.x > e.startX + e.range) e.dir *= -1;

    // Collision with player
    if (player.invincible === 0 && rectCollide(player, e)) {
      // Check if stomping (player moving down and player bottom is above enemy middle)
      if (player.vy > 0 && player.y + player.h - e.y < 20) {
        // Stomp!
        e.alive = false;
        e.deadTimer = 0;
        player.vy = -7;
        sfxStomp();
        state.coins += 2;
        // Spawn particles
        for (let i = 0; i < 8; i++) {
          particles.push({
            x: e.x + e.w/2, y: e.y + e.h/2,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6 - 3,
            life: 30, maxLife: 30,
            color: '#8B4513',
            size: 4 + Math.random() * 3,
          });
        }
      } else {
        // Player hit
        die();
        return;
      }
    }
  }

  // ---- COINS ----
  for (const c of coins) {
    if (c.collected) continue;
    c.bob += 0.04;
    if (rectCollide(player, c)) {
      c.collected = true;
      state.coins++;
      sfxCoin();
      // Sparkle particles
      for (let i = 0; i < 6; i++) {
        particles.push({
          x: c.x + c.w/2, y: c.y + c.h/2,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5 - 2,
          life: 25, maxLife: 25,
          color: '#FFD700',
          size: 3 + Math.random() * 2,
        });
      }
    }
  }

  // ---- FLAG ----
  if (!flagReached && player.x + player.w >= FLAG_X) {
    flagReached = true;
    state.screen = 'win';
    sfxWin();
  }

  // ---- PARTICLES ----
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // ---- CAMERA ----
  const targetCamX = player.x - W * 0.3;
  cam.x += (targetCamX - cam.x) * 0.1;
  if (cam.x < 0) cam.x = 0;
  if (cam.x > LEVEL_W - W) cam.x = LEVEL_W - W;

  // ---- UI ----
  document.getElementById('coinDisplay').textContent = `🪙 × ${state.coins}`;
  document.getElementById('timeDisplay').textContent = `⏱ ${state.time.toFixed(1)}s`;
}

function die() {
  state.screen = 'dead';
  state.deadTimer = 60; // ~1 second
  state.deaths++;
  sfxDie();
  // Death particles
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: player.x + player.w/2, y: player.y + player.h/2,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 4,
      life: 40, maxLife: 40,
      color: '#E74C3C',
      size: 4 + Math.random() * 4,
    });
  }
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  ctx.clearRect(0, 0, W, H);

  // ---- BACKGROUND ----
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#5dade2');
  grad.addColorStop(0.5, '#85c1e9');
  grad.addColorStop(1, '#d4e6f1');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ---- CLOUDS (parallax) ----
  const cloudPositions = [
    { x: 100, y: 50, w: 80, h: 30 },
    { x: 350, y: 30, w: 100, h: 35 },
    { x: 600, y: 60, w: 70, h: 25 },
    { x: 900, y: 40, w: 90, h: 32 },
    { x: 1200, y: 55, w: 75, h: 28 },
    { x: 1500, y: 35, w: 110, h: 36 },
    { x: 1800, y: 50, w: 85, h: 30 },
    { x: 2100, y: 30, w: 95, h: 33 },
    { x: 2500, y: 55, w: 80, h: 28 },
    { x: 2800, y: 40, w: 100, h: 34 },
    { x: 3100, y: 50, w: 70, h: 26 },
    { x: 3400, y: 35, w: 90, h: 32 },
  ];
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const c of cloudPositions) {
    const cx = ((c.x - cam.x * 0.2) % (W + 200));
    const drawX = cx < -100 ? cx + W + 200 : cx;
    ctx.beginPath();
    ctx.ellipse(drawX + c.w/2, c.y, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(drawX + c.w/2 - 20, c.y + 5, c.w/3, c.h/3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(drawX + c.w/2 + 20, c.y + 3, c.w/3, c.h/3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- HILLS (far background) ----
  const hills = [
    { x: 0, w: 200, h: 60, color: '#a9dfbf' },
    { x: 300, w: 160, h: 50, color: '#a9dfbf' },
    { x: 700, w: 220, h: 65, color: '#a3d9b1' },
    { x: 1100, w: 180, h: 55, color: '#a9dfbf' },
    { x: 1500, w: 240, h: 70, color: '#a3d9b1' },
    { x: 1900, w: 170, h: 50, color: '#a9dfbf' },
    { x: 2200, w: 200, h: 60, color: '#a3d9b1' },
    { x: 2600, w: 190, h: 55, color: '#a9dfbf' },
    { x: 3000, w: 220, h: 65, color: '#a3d9b1' },
    { x: 3400, w: 180, h: 50, color: '#a9dfbf' },
  ];
  for (const h of hills) {
    const hx = h.x - cam.x * 0.3;
    if (hx > W + 50 || hx + h.w < -50) continue;
    ctx.fillStyle = h.color;
    ctx.beginPath();
    ctx.moveTo(hx, GROUND_Y);
    ctx.quadraticCurveTo(hx + h.w/2, GROUND_Y - h.h, hx + h.w, GROUND_Y);
    ctx.fill();
  }

  // ---- GROUND ----
  for (const g of groundSegs) {
    const gx = g[0] - cam.x;
    if (gx > W + 50 || gx + g[2] < -50) continue;
    // Grass top
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(gx, g[1], g[2], 6);
    // Dirt
    ctx.fillStyle = '#8B5E3C';
    ctx.fillRect(gx, g[1] + 6, g[2], g[3] - 6);
    // Dirt texture lines
    ctx.strokeStyle = '#7a5230';
    ctx.lineWidth = 1;
    for (let row = 0; row < 3; row++) {
      const ly = g[1] + 12 + row * 16;
      ctx.beginPath();
      ctx.moveTo(gx, ly);
      ctx.lineTo(gx + g[2], ly);
      ctx.stroke();
    }
  }

  // ---- PLATFORMS ----
  for (const p of platforms) {
    const px = p[0] - cam.x;
    if (px > W + 50 || px + p[2] < -50) continue;
    // Main brick
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(px, p[1], p[2], p[3]);
    // Brick lines
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1;
    for (let i = 0; i < p[2]; i += 16) {
      ctx.beginPath();
      ctx.moveTo(px + i, p[1]);
      ctx.lineTo(px + i, p[1] + p[3]);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(px, p[1] + p[3]/2);
    ctx.lineTo(px + p[2], p[1] + p[3]/2);
    ctx.stroke();
    // Light top edge
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(px, p[1], p[2], 2);
  }

  // ---- COINS ----
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.x - cam.x;
    if (cx > W + 20 || cx + c.w < -20) continue;
    const bobY = Math.sin(c.bob) * 2;
    // Glow
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10;
    // Coin body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(cx + c.w/2, c.y + c.h/2 + bobY, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Inner circle
    ctx.fillStyle = '#FFC300';
    ctx.beginPath();
    ctx.ellipse(cx + c.w/2, c.y + c.h/2 + bobY, c.w/3, c.h/3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ---- ENEMIES ----
  for (const e of enemies) {
    const ex = e.x - cam.x;
    if (ex > W + 50 || ex + e.w < -50) continue;

    if (!e.alive) {
      if (e.deadTimer < 20) {
        // Flattened
        const squash = Math.max(0, 1 - e.deadTimer / 20);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(ex, e.y + e.h - 6 * squash, e.w, 6 * squash);
      }
      continue;
    }

    // Body
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(ex + e.w/2, e.y + e.h - 10, e.w/2, Math.PI, 0, false);
    ctx.fill();
    ctx.fillRect(ex, e.y + e.h - 12, e.w, 10);
    // Feet
    ctx.fillStyle = '#5D3A1A';
    ctx.fillRect(ex - 2, e.y + e.h - 4, e.w/2 + 2, 6);
    ctx.fillRect(ex + e.w/2 - 2, e.y + e.h - 4, e.w/2 + 2, 6);
    // Eyes
    const eyeDir = e.dir;
    ctx.fillStyle = 'white';
    ctx.fillRect(ex + e.w/2 - 8 + (eyeDir > 0 ? 2 : 0), e.y + 5, 8, 7);
    ctx.fillRect(ex + e.w/2 + (eyeDir > 0 ? 2 : 0), e.y + 5, 8, 7);
    ctx.fillStyle = '#1a1a2e';
    const pupilOff = eyeDir > 0 ? 3 : 0;
    ctx.fillRect(ex + e.w/2 - 6 + pupilOff, e.y + 7, 4, 5);
    ctx.fillRect(ex + e.w/2 + 2 + pupilOff, e.y + 7, 4, 5);
    // Angry eyebrows
    ctx.strokeStyle = '#5D3A1A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ex + e.w/2 - 10, e.y + 3);
    ctx.lineTo(ex + e.w/2 - 2, e.y + 5);
    ctx.moveTo(ex + e.w/2 + 10, e.y + 3);
    ctx.lineTo(ex + e.w/2 + 2, e.y + 5);
    ctx.stroke();
  }

  // ---- FLAG ----
  const fx = FLAG_X - cam.x;
  if (fx > -50 && fx < W + 50) {
    // Pole
    ctx.fillStyle = '#7f8c8d';
    ctx.fillRect(fx, GROUND_Y - 100, 4, 100);
    // Ball on top
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath();
    ctx.arc(fx + 2, GROUND_Y - 100, 5, 0, Math.PI * 2);
    ctx.fill();
    // Flag
    const flagWave = Math.sin(state.frame * 0.05) * 3;
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath();
    ctx.moveTo(fx + 4, GROUND_Y - 95);
    ctx.lineTo(fx + 35 + flagWave, GROUND_Y - 85);
    ctx.lineTo(fx + 4, GROUND_Y - 75);
    ctx.fill();
    // "GOAL" text
    ctx.fillStyle = '#27ae60';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GOAL', fx + 20, GROUND_Y - 62);
  }

  // ---- PLAYER ----
  if (state.screen !== 'dead' || state.deadTimer % 6 < 3) {
    const px = player.x - cam.x;
    const py = player.y;

    // Blink when invincible
    if (player.invincible > 0 && state.frame % 4 < 2) {
      // skip drawing
    } else {
      const f = player.facingRight ? 1 : -1;

      // Legs
      ctx.fillStyle = '#2980b9';
      const legOff = player.grounded && Math.abs(player.vx) > 1 ? (Math.sin(state.frame * 0.4) * 3) : 0;
      ctx.fillRect(px + 4 + legOff, py + player.h - 8, 6, 8);
      ctx.fillRect(px + 14 - legOff, py + player.h - 8, 6, 8);

      // Body (red shirt)
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(px + 3, py + 10, 18, 12);

      // Arms
      ctx.fillStyle = '#F5CBA7';
      const armSwing = player.grounded && Math.abs(player.vx) > 1 ? Math.sin(state.frame * 0.4) * 2 : 0;
      ctx.fillRect(px - 2, py + 12 + armSwing, 5, 10);
      ctx.fillRect(px + 21, py + 12 - armSwing, 5, 10);

      // Head
      ctx.fillStyle = '#F5CBA7';
      ctx.fillRect(px + 4, py + 2, 16, 10);

      // Hat
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(px + 2, py - 2, 20, 6);
      ctx.fillRect(px + 6, py - 6, 12, 5);

      // Eyes
      ctx.fillStyle = '#1a1a2e';
      const eyeX = f > 0 ? 5 : 1;
      ctx.fillRect(px + 6 + eyeX, py + 4, 3, 3);
      ctx.fillRect(px + 13 + eyeX, py + 4, 3, 3);

      // Eye white highlight
      ctx.fillStyle = 'white';
      ctx.fillRect(px + 7 + eyeX, py + 4, 1, 1);
      ctx.fillRect(px + 14 + eyeX, py + 4, 1, 1);

      // Mouth
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(px + 9, py + 9, 6, 1.5);
    }
  }

  // ---- PARTICLES ----
  for (const p of particles) {
    const px = p.x - cam.x;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(px - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // ---- OVERLAYS ----
  if (state.screen === 'start') {
    drawOverlay('超级小马里奥', '按 SPACE 或点击开始', '#2ecc71');
  }

  if (state.screen === 'win') {
    drawWinScreen();
  }

  if (state.screen === 'dead' && state.deadTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💀', W/2, H/2 - 10);
  }
}

function drawOverlay(title, subtitle, color) {
  // Dim background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  // Decorative border
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 3;
  ctx.strokeRect(40, 60, W - 80, H - 120);

  // Title
  ctx.fillStyle = color;
  ctx.font = 'bold 42px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.fillText(title, W/2, H/2 - 40);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#ecf0f1';
  ctx.font = '18px Arial';
  ctx.fillText(subtitle, W/2, H/2 + 30);

  // Controls hint
  ctx.fillStyle = '#95a5a6';
  ctx.font = '13px Arial';
  ctx.fillText('← → 移动  |  SPACE / ↑ 跳跃  |  踩敌人消灭它们', W/2, H/2 + 80);
  ctx.fillText('收集金币，到达 🚩 旗帜即可通关！', W/2, H/2 + 105);
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  // Win title
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 44px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#f1c40f';
  ctx.shadowBlur = 30;
  ctx.fillText('🎉 恭喜通关！ 🎉', W/2, H/2 - 60);
  ctx.shadowBlur = 0;

  // Stats
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText(`⏱ 用时: ${state.time.toFixed(1)}s`, W/2, H/2 + 10);
  ctx.fillText(`🪙 金币: ${state.coins}  |  💀 死亡: ${state.deaths}  |  🦘 跳跃: ${state.jumpCount}`, W/2, H/2 + 45);

  // Rating
  let rating = '';
  let ratingColor = '#95a5a6';
  if (state.deaths === 0 && state.time < 20) { rating = '🏆 完美通关！太厉害了！'; ratingColor = '#f1c40f'; }
  else if (state.deaths === 0) { rating = '🌟 无死亡通关！'; ratingColor = '#2ecc71'; }
  else if (state.deaths <= 3) { rating = '👍 不错哦！'; ratingColor = '#3498db'; }
  else { rating = '💪 继续加油！'; ratingColor = '#e74c3c'; }

  ctx.fillStyle = ratingColor;
  ctx.font = 'bold 18px Arial';
  ctx.fillText(rating, W/2, H/2 + 90);

  // Restart hint
  ctx.fillStyle = '#95a5a6';
  ctx.font = '14px Arial';
  ctx.fillText('按 SPACE 或点击重新开始', W/2, H/2 + 130);
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  START
// ============================================================
state.screen = 'start';
resetGame();
gameLoop();

// Screen transitions
['keydown', 'keyup'].forEach(evt => document.addEventListener(evt, e => {
  if (e.key === ' ') e.preventDefault();
}));
document.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter') && state.screen === 'start') {
    startGame();
  } else if ((e.key === ' ' || e.key === 'Enter') && state.screen === 'win') {
    resetGame(); state.screen = 'start';
  }
});
canvas.addEventListener('click', () => {
  if (state.screen === 'start') startGame();
  else if (state.screen === 'win') { resetGame(); state.screen = 'start'; }
});
canvas.addEventListener('touchend', e => {
  if (state.screen === 'start') { e.preventDefault(); startGame(); }
  else if (state.screen === 'win') { e.preventDefault(); resetGame(); state.screen = 'start'; }
});

console.log('🎮 超级小马里奥已加载！');
console.log('操作: ← → 移动，SPACE/↑ 跳跃，踩敌人消灭，收集金币到达旗帜！');
</script>
